<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>¿Recuerdas este juego?</title>

<style>
:root{ --accent:#ffd966; --bg1:#1c1c1c; --bg2:#373737; }

html,body{
  height:100%;
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:#fff;
  overflow:hidden;
}

.wrap{
  min-height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  box-sizing:border-box;
  position:relative;
  z-index:2;
}

h1{font-size:2rem;margin:0}
.subtitle{color:var(--accent);margin-top:6px;margin-bottom:14px;text-align:center}

.score{
  background:rgba(255,255,255,0.06);
  padding:10px 20px;
  border-radius:18px;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  margin-bottom:18px;
}

.game{
  background:rgba(255,255,255,0.03);
  padding:26px;
  border-radius:18px;
  box-shadow:0 12px 40px rgba(0,0,0,0.45);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-width:320px;
}

#hands{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:18px;
  margin-bottom:18px;
}

.hand{
  width:130px;
  height:130px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:72px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  box-shadow:inset 0 0 16px rgba(0,0,0,0.4);
  transition:transform .2s;
}

.hand.main{transform:scale(1.08)}

.vs{color:var(--accent);font-weight:600}

.buttons{
  margin-top:6px;
  display:flex;
  gap:10px;
  justify-content:center;
}

.buttons button{
  width:80px;
  height:80px;
  border-radius:14px;
  border:none;
  font-size:36px;
  cursor:pointer;
  background:linear-gradient(145deg,#fff,#e6e6e6);
  box-shadow:0 8px 20px rgba(0,0,0,0.45);
  transition:transform .18s;
}

.buttons button:hover{
  transform:translateY(-6px) scale(1.05);
}

#result{
  margin-top:12px;
  color:var(--accent);
  font-weight:600;
  text-align:center;
}

/* Animación ganador */
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
.winAnim{animation:pulse .6s ease}

/* Corazones fondo */
.bg-heart{
  position:fixed;
  top:-20px;
  color:#ff6b9d;
  opacity:0.35;
  pointer-events:none;
  animation:floatDown linear forwards;
  z-index:1;
}

@keyframes floatDown{
  to{
    transform:translateY(110vh);
    opacity:0;
  }
}

/* Confetti */
#confetti{
  position:fixed;
  left:0;
  top:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:3;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Yeli… ¿recuerdas este juego? 🤭</h1>

<div class="subtitle">
Dicen que los recuerdos bonitos empiezan con algo simple…<br>
Vamos a jugar como antes.<br>
El primero en llegar a 10 gana…<br>
(aunque yo sé que vas a ganar tú ❤️)
</div>

<div class="score">
Tú: <strong id="userScore">0</strong>
&nbsp;|&nbsp;
Yo: <strong id="cpuScore">0</strong>
</div>

<div class="game">
  <div id="hands">
    <div class="hand main" id="user-hand">✊</div>
    <div class="vs">VS</div>
    <div class="hand bot" id="computer-hand">✊</div>
  </div>

  <div class="buttons">
    <button onclick="play('rock')">✊</button>
    <button onclick="play('paper')">🖐️</button>
    <button onclick="play('scissors')">✌️</button>
  </div>

  <div id="result">
    Vamos… elige tu jugada, quiero ver si sigues siendo buena en esto 😏
  </div>
</div>

</div>

<canvas id="confetti"></canvas>

<script>
let user = 0, cpu = 0;

const hands = { rock:"✊", paper:"🖐️", scissors:"✌️" };
const winPairs = { rock:"scissors", scissors:"paper", paper:"rock" };

const userHandEl = document.getElementById('user-hand');
const cpuHandEl = document.getElementById('computer-hand');
const userScoreEl = document.getElementById('userScore');
const cpuScoreEl = document.getElementById('cpuScore');
const resultEl = document.getElementById('result');

/* =========================
   CPU más suave (pierde más)
========================= */
function cpuChoice(player){
  const options = ['rock','paper','scissors'];

  // 65% probabilidad de perder contra ella
  if(Math.random() < 0.65){
    return Object.keys(winPairs).find(k => winPairs[k] === player);
  }

  return options[Math.floor(Math.random()*3)];
}

/* =========================
   Corazones flotantes
========================= */
function floatingHearts(){
  setInterval(()=>{
    const heart = document.createElement("div");
    heart.className = "bg-heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (10 + Math.random()*18) + "px";
    heart.style.animationDuration = (6 + Math.random()*6) + "s";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),12000);
  },600);
}
floatingHearts();

/* =========================
   Confetti
========================= */
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confettiPieces = [];
let confettiActive = false;

function launchConfetti(){
  confettiPieces = [];
  for(let i=0;i<160;i++){
    confettiPieces.push({
      x: Math.random()*canvas.width,
      y: -20,
      size: Math.random()*8+4,
      speed: Math.random()*3+2,
      color:`hsl(${Math.random()*360},100%,60%)`
    });
  }
  confettiActive = true;
  animateConfetti();
  setTimeout(()=>{confettiActive=false;ctx.clearRect(0,0,canvas.width,canvas.height)},3000);
}

function animateConfetti(){
  if(!confettiActive) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  confettiPieces.forEach(p=>{
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x,p.y,p.size,p.size);
    p.y += p.speed;
  });
  requestAnimationFrame(animateConfetti);
}

/* =========================
   Animación ronda
========================= */
function applyRoundEffect(el){
  el.classList.add('winAnim');
  setTimeout(()=>el.classList.remove('winAnim'),600);
}

/* =========================
   Juego
========================= */
function play(choice){

  const computer = cpuChoice(choice);

  userHandEl.textContent = hands[choice];
  cpuHandEl.textContent = hands[computer];

  let text = "";

  if(choice === computer){
    text = "Empate… estamos igual de conectados ❤️";
  }
  else if(winPairs[choice] === computer){
    user++;
    applyRoundEffect(userHandEl);

    const wins = [
      "¡Sabía que ibas a ganar! 😌",
      "Así me gustas… imparable ❤️",
      "Otra victoria tuya… ya me acostumbré 😅",
      "Si sigues así, me vas a enamorar otra vez 😳"
    ];
    text = wins[Math.floor(Math.random()*wins.length)];
  }
  else{
    cpu++;
    applyRoundEffect(cpuHandEl);

    const loses = [
      "Ok… una para mí, pero igual quiero que ganes tú 😉",
      "Tranquila… esto solo hace el juego más interesante",
      "Me dejé ganar… digo… perder 😅"
    ];
    text = loses[Math.floor(Math.random()*loses.length)];
  }

  userScoreEl.textContent = user;
  cpuScoreEl.textContent = cpu;
  resultEl.textContent = text;

  /* Victoria de ella */
  if(user === 10){
    resultEl.textContent = "Sabía que ganarías… Felices 11 meses, Yeli ❤️";
    launchConfetti();
    setTimeout(()=>{ window.location.href='puerta.html'; },3000);
  }

  /* Si pierde */
  if(cpu === 10){
    resultEl.textContent = "Casi… pero quiero seguir jugando contigo ❤️";

    setTimeout(()=>{
      user = 0;
      cpu = 0;
      userScoreEl.textContent = 0;
      cpuScoreEl.textContent = 0;
      userHandEl.textContent = "✊";
      cpuHandEl.textContent = "✊";
      resultEl.textContent = "Otra vez… esta vez sé que vas a ganar 😏";
    },1800);
  }
}
</script>

</body>
</html>
